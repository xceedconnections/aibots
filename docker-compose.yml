services:
  postgres:
    image: postgres:16-alpine
    container_name: aibots-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aibots}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aibots_secure_pass}
      POSTGRES_DB: ${POSTGRES_DB:-aibots}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aibots}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: aibots-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    container_name: aibots-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Uncomment if you have an NVIDIA GPU:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: aibots-api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app
      - ./data/recordings:/recordings
      - ./data/models:/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    command: >
      sh -c "python -m app.seed || echo 'SEED WARN: continuing';
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  worker:
    build:
      context: ./apps/worker
      dockerfile: Dockerfile
    container_name: aibots-worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      API_INTERNAL_URL: http://api:8000
      SIMULATE_MODE: ${SIMULATE_MODE:-true}
    volumes:
      - ./apps/worker:/app
      - ./data/recordings:/recordings
      - ./data/models:/models
    depends_on:
      - api
      - redis
      - ollama

  portal:
    build:
      context: ./apps/portal
      dockerfile: Dockerfile
      args:
        # Empty = use same-origin /api proxy (works for any server IP)
        VITE_API_URL: ${VITE_API_URL:-}
    container_name: aibots-portal
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - api

  nginx:
    image: nginx:alpine
    container_name: aibots-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - portal

volumes:
  postgres_data:
  redis_data:
  ollama_data:
