; Transport — UDP 5060 for VICIdial carrier
[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
external_media_address=PUBLIC_IP
external_signaling_address=PUBLIC_IP
local_net=10.0.0.0/8
local_net=172.16.0.0/12
local_net=192.168.0.0/16

; Auth for VICIdial → AIBOTS trunk
[vicidial-auth]
type=auth
auth_type=userpass
username=aibots
password=AIBOTS_SIP_PASSWORD

; Identify VICIdial box(es)
[vicidial-identify]
type=identify
endpoint=vicidial
match=VICIDIAL_IP

; Endpoint VICIdial dials into (AI answers)
[vicidial]
type=endpoint
context=from-vicidial
disallow=all
allow=ulaw
allow=alaw
auth=vicidial-auth
aors=vicidial
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
dtmf_mode=rfc4733

[vicidial]
type=aor
max_contacts=5
remove_existing=yes

; Outbound trunk back to VICIdial for closer transfer
[vicidial-out]
type=endpoint
context=from-internal
disallow=all
allow=ulaw
allow=alaw
aors=vicidial-out
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes

[vicidial-out]
type=aor
contact=sip:VICIDIAL_IP:5060
