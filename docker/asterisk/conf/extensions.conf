; Vendor-style AI carrier dialplan
; VICIdial dials SIP/aibots@AIBOTS_IP → lands here

[from-vicidial]
; Extension can be campaign/bot id or any dialed digits from carrier
exten => _X.,1,NoOp(AIBOTS SIP call exten=${EXTEN} channel=${CHANNEL})
 same => n,Answer()
 same => n,Set(TIMEOUT(absolute)=600)
 same => n,Set(BOT_KEY=${EXTEN})
 same => n,Set(CALLER=${CALLERID(num)})
 same => n,Set(UNIQUE=${UNIQUEID})
 ; Start AI session via API (campaign/bot encoded in dialed exten or header)
 same => n,Set(START_URL=http://api:8000/webhook/vicidial/start)
 same => n,Set(CURL_RESULT=${CURL(${START_URL}?campaign=${BOT_KEY}&phone=${CALLER}&call_id=${UNIQUE}&channel=${CHANNEL}&simulate=false)})
 same => n,NoOp(Start result: ${CURL_RESULT})
 ; Bridge audio to AI worker AudioSocket
 same => n,AudioSocket(worker:9092,${UNIQUE})
 same => n,Hangup()

exten => s,1,Goto(from-vicidial,9999,1)

; Transfer target — worker/AMI/redirect or dialplan Transfer()
[aibots-transfer]
exten => _X.,1,NoOp(Transfer to closer ${EXTEN})
 same => n,Dial(PJSIP/${EXTEN}@vicidial-out,45,tT)
 same => n,Hangup()

[from-internal]
exten => _X.,1,Hangup()
