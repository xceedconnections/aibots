upstream aibots_api {
    server api:8000;
    keepalive 16;
}

upstream aibots_portal {
    server portal:80;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 50M;

    location /api/ {
        proxy_pass http://aibots_api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 15s;
        proxy_read_timeout 300s;
    }

    location = /api/health {
        proxy_pass http://aibots_api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /webhook/ {
        proxy_pass http://aibots_api/webhook/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }

    location /docs {
        proxy_pass http://aibots_api/docs;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://aibots_api/openapi.json;
        proxy_set_header Host $host;
    }

    location /health {
        proxy_pass http://aibots_api/health;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://aibots_portal/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
