; ============================================================
; AIBOTS Asterisk dialplan snippet (on VICIdial/Asterisk server)
; Place in extensions.conf or via VICIdial custom dialplan
; ============================================================
;
; When AI qualifies a lead, AMI Redirect sends the channel here:
;   Context: aibots-transfer
;   Exten:   <closer_campaign_name>   e.g. ACA_CLOSERS
;
; Adjust the Dial() target to your VICIdial closer in-group / campaign
; routing. Common patterns use Local channels into VICIdial contexts.

[aibots-transfer]
exten => _X.,1,NoOp(AIBOTS transfer to closer ${EXTEN})
 same => n,Set(CLOSERS=${EXTEN})
 ; Example: dump into VICIdial closer via Local channel — customize!
 same => n,Dial(Local/${CLOSERS}@default,30,tT)
 same => n,Hangup()

exten => ACA_CLOSERS,1,NoOp(AIBOTS -> ACA_CLOSERS)
 same => n,Dial(Local/9999@default,30,tT)
 same => n,Hangup()

; Optional: custom AGI that notifies AIBOTS webhook when call answered
; exten => s,n,AGI(aibots_start.agi)
